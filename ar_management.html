// BILLING EXCEL UPLOAD (SheetJS)
// ============================================================
async function handleBillingUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  setStatus('loading', `${file.name} を解析中...`);
  const preview = document.getElementById('billingImportPreview');

  try {
    if (typeof XLSX === 'undefined') throw new Error('SheetJSライブラリが読み込まれていません。ページを再読み込みしてください。');

    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    if (rows.length < 5) throw new Error('データが少なすぎます。正しいSMILE請求一覧表か確認してください。');

    processBillingRows(rows);
    setStatus('success', `${file.name}: 解析完了`);
  } catch(e) {
    console.error(e);
    preview.innerHTML = `<div class="cp-result fail"><div class="cp-title">Excel解析エラー: ${escHtml(e.message)}</div></div>`;
    setStatus('error', 'Excel読み込みエラー');
  }
}

// ============================================================
// ACCOUNTING CHECK (③ 会計残高チェック - SheetJS)
// ============================================================
async function runAccountingCheck(event) {
  const file = event.target.files[0];
  if (!file) return;

  const result = document.getElementById('cp3_result');
  result.innerHTML = '<div class="text-muted">Excel解析中...</div>';

  try {
    if (typeof XLSX === 'undefined') throw new Error('SheetJSライブラリが読み込まれていません。');

    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    // Parse 内訳残高一覧表: find科目124(売掛金) section
    // Format: column 0 or 1 = 内訳コード, column 2 or 3 = 内訳名, last numeric column = 残高
    const acctBalances = {};
    let inUrikake = false;
    let totalAcct = 0;

    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      const rowText = r.map(c => String(c)).join(' ');

      // Detect section start: look for 科目124 or 売掛金
      if (rowText.includes('124') && (rowText.includes('売掛金') || rowText.includes('売掛'))) {
        inUrikake = true;
        continue;
      }

      // Detect section end: next 科目 line
      if (inUrikake && rowText.match(/科目\s*\d{3}/) && !rowText.includes('124')) {
        break;
      }

      if (!inUrikake) continue;

      // Skip header/summary rows
      if (rowText.includes('科目計') || rowText.includes('合計') || rowText.includes('内訳コード')) continue;

      // Extract code and balance
      // Try to find a 4-digit code in first columns
      let code = '', balance = 0;
      for (let j = 0; j < Math.min(3, r.length); j++) {
        const v = String(r[j]).trim();
        if (v.match(/^\d{1,4}$/) && !code) {
          code = v.padStart(4, '0');
          break;
        }
      }

      if (!code || code === '0000') continue;

      // Get balance from the last numeric column
      for (let j = r.length - 1; j >= 3; j--) {
        const v = parseFloat(String(r[j]).replace(/[,\s]/g, ''));
        if (!isNaN(v) && v !== 0) {
          balance = v;
          break;
        }
      }

      // Get name from column after code
      let name = '';
      for (let j = 1; j < Math.min(5, r.length); j++) {
        const v = String(r[j]).trim();
        if (v && !v.match(/^\d/) && v.length > 1) { name = v; break; }
      }

      if (code && balance !== 0) {
        acctBalances[code] = { name, balance };
        totalAcct += balance;
      }
    }

    if (Object.keys(acctBalances).length === 0) {
      throw new Error('科目124（売掛金）のデータが見つかりません。内訳残高一覧表か確認してください。');
    }

    // Build app balances by CompanyCode (top 4 digits)
    const appBalances = {};
    DATA.ledger.forEach(l => {
      const cc = l.CompanyCode || companyCode(l.CustCode);
      if (!cc || cc === '0000') return;
      if (!appBalances[cc]) appBalances[cc] = { name: l.BillingName, balance: 0, count: 0 };
      appBalances[cc].balance += Number(l.NextMonthBalance) || 0;
      appBalances[cc].count++;
    });

    // Compare
    const allCodes = new Set([...Object.keys(acctBalances), ...Object.keys(appBalances)]);
    const mismatches = [];
    let matchCount = 0;

    for (const code of allCodes) {
      const acct = acctBalances[code];
      const app = appBalances[code];
      const acctBal = acct?.balance || 0;
      const appBal = app?.balance || 0;

      if (Math.abs(acctBal - appBal) > 0.5) {  // Allow rounding difference
        mismatches.push({
          code,
          name: acct?.name || app?.name || '—',
          acctBalance: acctBal,
          appBalance: appBal,
          diff: appBal - acctBal,
          onlyAcct: !app,
          onlyApp: !acct,
        });
      } else {
        matchCount++;
      }
    }

    const totalApp = Object.values(appBalances).reduce((s, v) => s + v.balance, 0);
    const ok = mismatches.length === 0;

    result.innerHTML = `
      <div class="cp-result ${ok ? 'pass' : 'fail'}">
        <div class="cp-title">${ok ? '✓ 全件一致' : `✗ ${mismatches.length}件の差異あり`}</div>
        <div class="cp-detail">
          会計: ${Object.keys(acctBalances).length}件 / ¥${fmtNum(totalAcct)} | アプリ: ${Object.keys(appBalances).length}件 / ¥${fmtNum(totalApp)} | 一致: ${matchCount}件
        </div>
      </div>
      ${mismatches.length > 0 ? `
      <table class="data-table mt-8" style="font-size:11px">
        <thead><tr><th>コード</th><th>名称</th><th class="text-right">会計残高</th><th class="text-right">アプリ残高</th><th class="text-right">差額</th><th>備考</th></tr></thead>
        <tbody>${mismatches.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff)).map(m => `
          <tr>
            <td class="td-code">${escHtml(m.code)}</td>
            <td class="truncate">${escHtml(m.name)}</td>
            <td class="td-num">${fmtNum(m.acctBalance)}</td>
            <td class="td-num">${fmtNum(m.appBalance)}</td>
            <td class="td-num text-danger">${fmtNum(m.diff)}</td>
            <td class="text-muted">${m.onlyAcct ? '会計のみ' : m.onlyApp ? 'アプリのみ' : ''}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : ''}
    `;

    logAudit('会計残高チェック', 'AR_Ledger', null, '', `会計:${Object.keys(acctBalances).length}件, 一致:${matchCount}, 差異:${mismatches.length}`);
  } catch(e) {
    console.error(e);
    result.innerHTML = `<div class="cp-result fail"><div class="cp-title">エラー: ${escHtml(e.message)}</div></div>`;
  }
}

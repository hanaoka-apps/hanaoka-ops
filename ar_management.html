<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>売掛管理アプリ — 花岡車輌</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.10.0/lib/msal-browser.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #f5f6fa; --surface: #fff; --surface2: #f0f2f7;
  --border: #e2e6ed; --accent: #185FA5; --accent2: #3B6D11;
  --danger: #A32D2D; --warn: #854F0B; --text: #1a1d2e;
  --text-muted: #6b7194; --ms-blue: #0078d4;
  --success: #38a169; --orange: #ed8936; --purple: #805AD5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Yu Gothic',sans-serif;min-height:100vh;font-size:13px}

/* ===== LOGIN ===== */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px}
.login-logo{width:56px;height:56px;background:var(--ms-blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}
.login-title{font-size:20px;font-weight:600}
.login-subtitle{font-size:13px;color:var(--text-muted);text-align:center;max-width:360px;line-height:1.6}
.login-btn{display:flex;align-items:center;gap:10px;background:var(--ms-blue);color:#fff;border:none;border-radius:6px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer}
.login-btn:hover{opacity:.9}
.login-error{color:var(--danger);font-size:12px;display:none}

/* ===== APP SHELL ===== */
#app{display:none;flex-direction:column;height:100vh}

/* Topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:3px 10px 3px 4px;font-size:12px;color:var(--text-muted)}
.user-avatar{width:22px;height:22px;border-radius:50%;background:var(--ms-blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Status bar */
.status-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0}
.status-dot{width:7px;height:7px;border-radius:50%}
.status-bar.loading .status-dot{background:#EF9F27;animation:pulse 1s infinite}
.status-bar.success .status-dot{background:#639922}
.status-bar.error .status-dot{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Nav tabs */
.nav-bar{display:flex;gap:2px;padding:0 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.nav-tab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* Main content */
.main-content{flex:1;overflow-y:auto;padding:16px}

/* ===== DASHBOARD ===== */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.dash-card h4{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px}
.dash-card .big-num{font-size:28px;font-weight:700;color:var(--text)}
.dash-card .sub-num{font-size:12px;color:var(--text-muted);margin-top:2px}
.dash-card.danger{border-left:3px solid var(--danger)}
.dash-card.warn{border-left:3px solid var(--orange)}
.dash-card.ok{border-left:3px solid var(--success)}
.dash-card.info{border-left:3px solid var(--accent)}

/* ===== TABLES ===== */
.data-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.data-table thead{position:sticky;top:0;z-index:5}
.data-table th{background:#1a365d;color:#fff;padding:8px 10px;text-align:left;font-size:10px;font-weight:600;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tbody tr:hover{background:var(--surface2)}
.data-table tbody tr.selected{background:#E6F1FB}
.td-num{text-align:right;font-family:'Consolas',monospace;font-size:11px}
.td-code{font-family:'Consolas',monospace;font-size:11px;color:var(--accent)}
.td-muted{color:var(--text-muted);font-size:11px}

/* ===== BADGES ===== */
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-gray{background:#F1EFE8;color:#5F5E5A}
.badge-orange{background:#FEF0E6;color:#C05C10}
.badge-purple{background:#EEEDFE;color:#534AB7}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ===== FORMS ===== */
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.form-input,.form-select,.form-textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--surface);color:var(--text);font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(24,95,165,.15)}
.form-textarea{min-height:80px;resize:vertical}

/* ===== SECTION HEADERS ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
.section-desc{font-size:12px;color:var(--text-muted);margin-bottom:16px}

/* ===== MODALS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);width:90%;max-width:700px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ===== FILE DROP ===== */
.file-drop{border:2px dashed var(--border);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.file-drop:hover,.file-drop.dragover{border-color:var(--accent);background:#E6F1FB}
.file-drop-label{font-size:13px;color:var(--text-muted)}

/* ===== IMPORT PREVIEW ===== */
.import-preview{max-height:300px;overflow:auto;margin:12px 0;border:1px solid var(--border);border-radius:8px}

/* ===== CHECKPOINT ===== */
.cp-result{padding:12px;border-radius:8px;margin-bottom:8px}
.cp-result.pass{background:#f0fff4;border:1px solid #9ae6b4}
.cp-result.fail{background:#fff5f5;border:1px solid #feb2b2}
.cp-result .cp-title{font-weight:600;margin-bottom:4px}
.cp-result .cp-detail{font-size:11px;color:var(--text-muted)}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){.dash-grid{grid-template-columns:1fr 1fr}.nav-tab{padding:8px 12px}}
@media(max-width:480px){.dash-grid{grid-template-columns:1fr}}

/* ===== UTILITY ===== */
.text-right{text-align:right}
.text-center{text-align:center}
.text-muted{color:var(--text-muted)}
.text-danger{color:var(--danger)}
.text-success{color:var(--success)}
.mt-8{margin-top:8px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.gap-8{gap:8px}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.flex-1{flex:1}
.hidden{display:none!important}
.mono{font-family:'Consolas',monospace}
.nowrap{white-space:nowrap}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
  <div class="login-logo">売</div>
  <div class="login-title">売掛管理アプリ</div>
  <div class="login-subtitle">花岡車輌株式会社<br>Microsoft 365 アカウントでサインインしてください</div>
  <button id="loginBtn" class="login-btn">
    <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
    Microsoft でサインイン
  </button>
  <div id="loginError" class="login-error"></div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">売掛管理</span>
    </div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar"></div>
        <span id="userName"></span>
      </div>
      <button id="logoutBtn" class="logout-btn">サインアウト</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">準備中...</span>
  </div>

  <!-- Navigation tabs -->
  <div class="nav-bar" id="navBar">
    <div class="nav-tab active" data-page="dashboard">ダッシュボード</div>
    <div class="nav-tab" data-page="billing">請求取込</div>
    <div class="nav-tab" data-page="payments">入金取込</div>
    <div class="nav-tab" data-page="reconcile">消込</div>
    <div class="nav-tab" data-page="smile-export">SMILEエクスポート</div>
    <div class="nav-tab" data-page="checkpoints">チェックポイント</div>
    <div class="nav-tab" data-page="special">特別請求</div>
    <div class="nav-tab" data-page="namedict">名寄せ辞書</div>
  </div>

  <!-- Main content area -->
  <div class="main-content" id="mainContent">
    <!-- Pages are rendered dynamically -->
  </div>
</div>

<!-- ===== MODAL CONTAINER ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const MSAL_CONFIG = {
  auth: {
    clientId: 'd338d61b-01dc-4c7c-ac6b-aecf7f30d716',
    authority: 'https://login.microsoftonline.com/3933e8a0-c945-4e97-ae67-c82131087cad',
    redirectUri: window.location.origin + window.location.pathname,
  },
  cache: { cacheLocation: 'sessionStorage' }
};
const SCOPES = ['User.Read', 'Sites.ReadWrite.All'];

const SP = {
  site: 'hanaokacorp.sharepoint.com:/sites/msteams_20513c:',
  // List IDs — 総務部サイト（2026-04-14 取得）
  ledger:     'e8fc88d5-7bf2-469d-bec6-ef8da42ce76f',  // AR_Ledger
  payments:   'de8a9c61-43e1-4472-a3a4-503508d5c9c5',  // AR_Payments
  special:    '3aec98a6-5d1c-4d67-98a8-0c080f9ef149',  // AR_SpecialInvoice
  namedict:   '4524510b-1e59-4bc7-b925-220747e45377',  // AR_NameDict
  auditlog:   '3fea0dde-c813-424a-889c-860a5ab94a4d',  // AR_AuditLog
  masterLib:  'SharedMasters',
};

// ============================================================
// STATE
// ============================================================
let msalInstance = null, account = null, siteId = null;
let currentPage = 'dashboard';

// Data caches
const DATA = {
  ledger: [],
  payments: [],
  special: [],
  namedict: [],
  masters: [],  // 得意先マスタ
};

// ============================================================
// MSAL AUTH
// ============================================================
async function init() {
  if (typeof msal === 'undefined') {
    showLoginError('MSALライブラリが読み込めませんでした。再読み込みしてください。');
    return;
  }
  msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
  await msalInstance.initialize();
  await msalInstance.handleRedirectPromise();
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    account = accounts[0];
    showApp();
    await loadInitialData();
  }
  document.getElementById('loginBtn').onclick = login;
  document.getElementById('logoutBtn').onclick = logout;
}

async function login() {
  try {
    hideLoginError();
    const result = await msalInstance.loginPopup({ scopes: SCOPES });
    account = result.account;
    showApp();
    await loadInitialData();
  } catch(e) {
    showLoginError('サインインに失敗しました: ' + e.message);
  }
}

function logout() {
  msalInstance.logoutPopup({ account });
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function getToken() {
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return r.accessToken;
  }
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const name = account.name || account.username;
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = name.charAt(0);
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}
function hideLoginError() {
  document.getElementById('loginError').style.display = 'none';
}

// ============================================================
// GRAPH API HELPERS
// ============================================================
async function graphGet(url) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + url, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!r.ok) throw new Error(`Graph API ${r.status}: ${url}`);
  return r.json();
}

async function graphPost(url, body) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const t = await r.text(); throw new Error(`Graph POST ${r.status}: ${t}`); }
  return r.json();
}

async function graphPatch(url, body) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const t = await r.text(); throw new Error(`Graph PATCH ${r.status}: ${t}`); }
  return r.json();
}

async function graphDelete(url) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!r.ok) throw new Error(`Graph DELETE ${r.status}: ${url}`);
}

async function getSiteId() {
  if (siteId) return siteId;
  const d = await graphGet(`/sites/${SP.site}`);
  siteId = d.id;
  return siteId;
}

// ============================================================
// SHAREPOINT CRUD — Generic List Operations
// ============================================================
async function spListItems(listId, top = 500) {
  const sid = await getSiteId();
  const all = [];
  let url = `/sites/${sid}/lists/${listId}/items?expand=fields&$top=${Math.min(top, 200)}`;
  while (url) {
    const data = await graphGet(url);
    all.push(...data.value.map(v => ({ _spId: v.id, ...v.fields })));
    url = data['@odata.nextLink'] ? data['@odata.nextLink'].replace('https://graph.microsoft.com/v1.0', '') : null;
  }
  return all;
}

async function spCreateItem(listId, fields) {
  const sid = await getSiteId();
  const res = await graphPost(`/sites/${sid}/lists/${listId}/items`, { fields });
  return { _spId: res.id, ...res.fields };
}

async function spUpdateItem(listId, itemSpId, fields) {
  const sid = await getSiteId();
  await graphPatch(`/sites/${sid}/lists/${listId}/items/${itemSpId}/fields`, fields);
}

async function spDeleteItem(listId, itemSpId) {
  const sid = await getSiteId();
  await graphDelete(`/sites/${sid}/lists/${listId}/items/${itemSpId}`);
}

// Audit log helper
async function logAudit(actionType, targetList, targetId, billingCode, description, oldVal, newVal) {
  if (!SP.auditlog) return;
  await spCreateItem(SP.auditlog, {
    Title: `${actionType}-${Date.now()}`,
    Timestamp: new Date().toISOString(),
    UserName: account?.name || '',
    UserEmail: account?.username || '',
    ActionType: actionType,
    TargetList: targetList,
    TargetId: targetId || 0,
    BillingCode: billingCode || '',
    Description: description || '',
    OldValue: oldVal ? JSON.stringify(oldVal) : '',
    NewValue: newVal ? JSON.stringify(newVal) : '',
  });
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadInitialData() {
  try {
    setStatus('loading', 'データを読み込み中...');

    // Check if list IDs are configured
    if (!SP.ledger || !SP.payments) {
      setStatus('error', 'SharePointリストIDが未設定です。SP設定を確認してください。');
      renderPage();
      return;
    }

    const [ledger, payments, special, namedict] = await Promise.all([
      spListItems(SP.ledger),
      spListItems(SP.payments),
      SP.special ? spListItems(SP.special) : [],
      SP.namedict ? spListItems(SP.namedict) : [],
    ]);

    DATA.ledger = ledger;
    DATA.payments = payments;
    DATA.special = special;
    DATA.namedict = namedict;

    setStatus('success', `読み込み完了 — 台帳:${ledger.length} 入金:${payments.length} 名寄せ:${namedict.length}`);
    renderPage();
  } catch(e) {
    console.error(e);
    setStatus('error', 'データ読み込みエラー: ' + e.message);
    renderPage();
  }
}

// ============================================================
// STATUS BAR
// ============================================================
function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.classList.remove('loading', 'success', 'error');
  bar.classList.add(type);
  document.getElementById('statusText').textContent = msg;
}

// ============================================================
// NAVIGATION
// ============================================================
document.getElementById('navBar').addEventListener('click', e => {
  const tab = e.target.closest('.nav-tab');
  if (!tab) return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentPage = tab.dataset.page;
  renderPage();
});

function renderPage() {
  const mc = document.getElementById('mainContent');
  switch(currentPage) {
    case 'dashboard':    mc.innerHTML = renderDashboard(); break;
    case 'payments':     mc.innerHTML = renderPayments(); break;
    case 'billing':      mc.innerHTML = renderBilling(); break;
    case 'reconcile':    mc.innerHTML = renderReconcile(); break;
    case 'smile-export': mc.innerHTML = renderSmileExport(); break;
    case 'checkpoints':  mc.innerHTML = renderCheckpoints(); break;
    case 'special':      mc.innerHTML = renderSpecial(); break;
    case 'namedict':     mc.innerHTML = renderNameDict(); break;
    default:             mc.innerHTML = renderDashboard();
  }
  attachPageHandlers();
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function fmtNum(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('ja-JP');
}
function fmtDate(d) {
  if (!d) return '—';
  // SharePoint returns "2026-03-31" or "2026-03-31T00:00:00Z"
  // new Date() treats "YYYY-MM-DD" as UTC → timezone shift issues
  // Instead, extract date parts directly from the string
  const s = String(d).substring(0, 10);  // "2026-03-31"
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return `${parseInt(m[1])}/${parseInt(m[2])}/${parseInt(m[3])}`;
  return new Date(d).toLocaleDateString('ja-JP');  // fallback
}
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function matchStatusBadge(status) {
  const map = {
    '未処理':           'badge-gray',
    '消込済':           'badge-green',
    '要確認':           'badge-orange',
    '違算調査中':       'badge-red',
    'SMILEエクスポート済': 'badge-blue',
    'SMILE入力済':      'badge-purple',
  };
  return `<span class="badge ${map[status] || 'badge-gray'}">${escHtml(status || '未処理')}</span>`;
}

// CSV parser (handles quoted fields)
function parseCSV(text, encoding) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  return lines.filter(l => l.trim()).map(line => {
    const result = [];
    let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { result.push(current.trim()); current = ''; }
        else { current += ch; }
      }
    }
    result.push(current.trim());
    return result;
  });
}

// TSV parser (for clipboard paste)
function parseTSV(text) {
  return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim()).map(l => l.split('\t'));
}

  return custCode ? String(custCode).padStart(6, '0').substring(0, 4) : '';

// Bank CSV Upload handler
async function handleBankCsvUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  setStatus('loading', `${file.name} を読み込み中...`);
  const preview = document.getElementById('bankImportPreview');

  try {
    // Read as Shift_JIS (CP932)
    const buffer = await file.arrayBuffer();
    const decoder = new TextDecoder('shift_jis');
    const text = decoder.decode(buffer);
    const rows = parseCSV(text);

    if (rows.length < 2) throw new Error('データが見つかりません');

    // Parse Zengin format (auto-detect account type from header)
    const manualType = document.getElementById('accountType').value;
    const { items: parsed, detectedAccountType } = parseZenginCSV(rows, manualType);
    const accountType = detectedAccountType || manualType;

    // Auto-set dropdown to match detected type
    if (detectedAccountType) {
      const sel = document.getElementById('accountType');
      if (sel) sel.value = detectedAccountType;
    }

    // Check duplicates (normalize dates: SP returns ISO "2026-03-02T00:00:00Z", CSV gives "2026-03-02")
    const dateOnly = d => (d || '').substring(0, 10);
    const existingKeys = new Set(DATA.payments.map(p => dateOnly(p.TransDate) + '|' + Number(p.Amount) + '|' + (p.PayerNameRaw || '')));
    const newItems = parsed.filter(p => !existingKeys.has(dateOnly(p.TransDate) + '|' + Number(p.Amount) + '|' + (p.PayerNameRaw || '')));
    const dupes = parsed.length - newItems.length;

    const autoLabel = detectedAccountType ? '（自動判定）' : '';
    preview.innerHTML = `
      <div class="cp-result pass">
        <div class="cp-title">読み込み結果: ${parsed.length}件（新規: ${newItems.length}件、重複スキップ: ${dupes}件）</div>
        <div class="cp-detail">${file.name} / ${accountType}預金 ${autoLabel}</div>
      </div>
      ${newItems.length > 0 ? `
      <div class="import-preview">
        <table class="data-table">
          <thead><tr><th>日付</th><th>区分</th><th>振込依頼人</th><th>摘要</th><th class="text-right">金額</th></tr></thead>
          <tbody>${newItems.slice(0, 50).map(p => `
            <tr>
              <td class="td-muted">${fmtDate(p.TransDate)}</td>
              <td><span class="badge badge-blue">${escHtml(p.TransType || '')}</span></td>
              <td>${escHtml(p.PayerNameRaw)}</td>
              <td class="td-muted">${escHtml(p.Tekiyou || '')}</td>
              <td class="td-num">¥${fmtNum(p.Amount)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <button class="btn btn-primary mt-8" id="btnImportBank" onclick="importBankPayments()">取り込み実行（${newItems.length}件）</button>
      ` : '<div class="text-muted mt-8">新規データはありません。</div>'}
    `;

    // Store parsed data for import
    window._pendingBankImport = newItems;
    setStatus('success', `${file.name}: ${newItems.length}件の新規データ`);
  } catch(e) {
    console.error(e);
    preview.innerHTML = `<div class="cp-result fail"><div class="cp-title">エラー: ${escHtml(e.message)}</div></div>`;
    setStatus('error', 'CSV読み込みエラー');
  }
}

function parseZenginCSV(rows, accountTypeOverride) {
  // SMBC Web21 全銀形式（CSV）
  // Row types: 1=ヘッダー, 2=明細データ, 8=トレーラー, 9=エンド
  // Header (type 1) col[11]: 預金種目 1=普通, 2=当座, 3=納税準備, 4=通知, 5=別段, 9=その他
  const YOKIN_MAP = {'1':'普通','2':'当座','3':'納税準備','4':'通知','5':'別段','9':'その他'};
  const TORIHIKI_MAP = {'11':'振込','12':'大口振込','13':'交換','14':'振替','15':'ATM','16':'CD','17':'手取立','18':'他店自振','19':'他店振込'};
  const results = [];
  let bankName = '', branchName = '', detectedAccountType = '';
  for (const r of rows) {
    // Type 1 = header: extract bank/branch info + account type
    if (r[0] === '1' && r.length >= 10) {
      bankName = r[7] || ''; branchName = r[9] || '';
      if (r.length > 11) detectedAccountType = YOKIN_MAP[r[11]] || '';
      continue;
    }
    // Only process type 2 (transaction data)
    if (r[0] !== '2' || r.length < 18) continue;
    // 入金のみ (入払区分=1)
    if (r[4] !== '1') continue;

    const amount = parseInt(String(r[6]).replace(/^0+/, '') || '0', 10);
    if (amount <= 0) continue;

    // 勘定日: 令和YYMMDD → YYYY-MM-DD (令和Y年 = 2018+Y)
    const dStr = r[2];
    const yy = parseInt(dStr.substring(0, 2), 10);
    const mm = dStr.substring(2, 4);
    const dd = dStr.substring(4, 6);
    const yyyy = 2018 + yy;
    const transDate = `${yyyy}-${mm}-${dd}`;

    // 振込依頼人名 (col14) → メイン, なければ摘要内容 (col17)
    const payerName = (r[14] || '').trim() || (r[17] || '').trim();
    const tekiyou = (r[17] || '').trim();

    const accountType = detectedAccountType || accountTypeOverride;
    results.push({
      TransDate: transDate,
      DataSource: accountType === '普通' ? '普通CSV' : '当座CSV',
      AccountType: accountType,
      Amount: amount,
      PayerNameRaw: payerName,
      PayerNameNorm: normalizePayerName(payerName),
      PayerCode: (r[13] || '').trim(),
      SenderBank: (r[15] || '').trim() || bankName,
      SenderBranch: (r[16] || '').trim() || branchName,
      TransType: TORIHIKI_MAP[r[5]] || r[5] || '',
      Tekiyou: tekiyou !== payerName ? tekiyou : '',
      Status: '未処理',
    });
  }
  return { items: results, detectedAccountType };
}

// Half-width katakana → Full-width katakana map
const HW2FW_KANA = {
  'ｦ':'ヲ','ｧ':'ァ','ｨ':'ィ','ｩ':'ゥ','ｪ':'ェ','ｫ':'ォ','ｬ':'ャ','ｭ':'ュ','ｮ':'ョ','ｯ':'ッ',
  'ｰ':'ー','ｱ':'ア','ｲ':'イ','ｳ':'ウ','ｴ':'エ','ｵ':'オ','ｶ':'カ','ｷ':'キ','ｸ':'ク','ｹ':'ケ','ｺ':'コ',
  'ｻ':'サ','ｼ':'シ','ｽ':'ス','ｾ':'セ','ｿ':'ソ','ﾀ':'タ','ﾁ':'チ','ﾂ':'ツ','ﾃ':'テ','ﾄ':'ト',
  'ﾅ':'ナ','ﾆ':'ニ','ﾇ':'ヌ','ﾈ':'ネ','ﾉ':'ノ','ﾊ':'ハ','ﾋ':'ヒ','ﾌ':'フ','ﾍ':'ヘ','ﾎ':'ホ',
  'ﾏ':'マ','ﾐ':'ミ','ﾑ':'ム','ﾒ':'メ','ﾓ':'モ','ﾔ':'ヤ','ﾕ':'ユ','ﾖ':'ヨ',
  'ﾗ':'ラ','ﾘ':'リ','ﾙ':'ル','ﾚ':'レ','ﾛ':'ロ','ﾜ':'ワ','ﾝ':'ン',
};
const HW_DAKUTEN = { // ﾞ (dakuten) combinations
  'ｶ':'ガ','ｷ':'ギ','ｸ':'グ','ｹ':'ゲ','ｺ':'ゴ','ｻ':'ザ','ｼ':'ジ','ｽ':'ズ','ｾ':'ゼ','ｿ':'ゾ',
  'ﾀ':'ダ','ﾁ':'ヂ','ﾂ':'ヅ','ﾃ':'デ','ﾄ':'ド','ﾊ':'バ','ﾋ':'ビ','ﾌ':'ブ','ﾍ':'ベ','ﾎ':'ボ','ｳ':'ヴ',
};
const HW_HANDAKUTEN = { // ﾟ (handakuten) combinations
  'ﾊ':'パ','ﾋ':'ピ','ﾌ':'プ','ﾍ':'ペ','ﾎ':'ポ',
};

function hwKanaToFw(str) {
  if (!str) return '';
  let result = '';
  for (let i = 0; i < str.length; i++) {
    const ch = str[i];
    const next = str[i+1];
    if (next === 'ﾞ' && HW_DAKUTEN[ch]) { result += HW_DAKUTEN[ch]; i++; }
    else if (next === 'ﾟ' && HW_HANDAKUTEN[ch]) { result += HW_HANDAKUTEN[ch]; i++; }
    else if (HW2FW_KANA[ch]) { result += HW2FW_KANA[ch]; }
    else { result += ch; }
  }
  return result;
}

// Hiragana → Full-width Katakana (ぁ-ん → ァ-ン)
function hiraToKata(str) {
  return str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
}

// Normalize for search: half-width kana → full-width kana, hiragana → katakana, uppercase
function normalizeForSearch(str) {
  if (!str) return '';
  let s = hwKanaToFw(str);       // ｶﾅ → カナ
  s = hiraToKata(s);             // かな → カナ
  s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
  return s.toUpperCase();
}

function normalizePayerName(raw) {
  if (!raw) return '';
  let s = raw.trim();
  // Half-width kana → full-width
  s = hwKanaToFw(s);
  // Full-width alphanumeric → half-width
  s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
  // Normalize brackets and spaces
  s = s.replace(/（/g, '(').replace(/）/g, ')').replace(/「/g, '(').replace(/」/g, ')');
  s = s.replace(/\s+/g, ' ').trim();
  // Remove common suffixes for matching
  s = s.replace(/(株式会社|有限会社|合同会社|㈱|㈲)/g, '').trim();
  s = s.replace(/(ｶﾌﾞｼｷｶﾞｲｼﾔ|ﾕｳｹﾞﾝｶﾞｲｼﾔ|カブシキガイシャ|ユウゲンガイシャ)/g, '').trim();
  return s;
}

// Simple fuzzy matching (Levenshtein-like)
function fuzzyScore(a, b) {
  if (!a || !b) return 0;
  a = a.toUpperCase(); b = b.toUpperCase();
  if (a === b) return 1.0;
  if (a.includes(b) || b.includes(a)) return 0.85;
  // Bigram overlap (Dice coefficient)
  const bigrams = s => { const bg = new Set(); for (let i = 0; i < s.length - 1; i++) bg.add(s.slice(i, i+2)); return bg; };
  const bg1 = bigrams(a), bg2 = bigrams(b);
  let intersection = 0;
  bg1.forEach(b => { if (bg2.has(b)) intersection++; });
  return bg1.size + bg2.size > 0 ? (2 * intersection) / (bg1.size + bg2.size) : 0;
}

async function purgeAllPayments() {
  const total = DATA.payments.length;
  if (total === 0) { alert('削除対象の入金データがありません。'); return; }
  if (!confirm(`⚠️ 入金データ ${total}件を全てSharePointから削除します。\nこの操作は取り消せません。よろしいですか？`)) return;

  setStatus('loading', `入金データ ${total}件を削除中...`);
  let deleted = 0, failed = 0;
  // Delete in batches of 10 for parallelism
  const batchSize = 10;
  for (let i = 0; i < DATA.payments.length; i += batchSize) {
    const batch = DATA.payments.slice(i, i + batchSize);
    const results = await Promise.allSettled(
      batch.map(p => spDeleteItem(SP.payments, p._spId))
    );
    results.forEach(r => { if (r.status === 'fulfilled') deleted++; else failed++; });
    setStatus('loading', `削除中... ${deleted}/${total}件完了`);
  }
  DATA.payments = [];
  setStatus('success', `✅ ${deleted}件削除完了${failed > 0 ? `（${failed}件失敗）` : ''}`);
  await logAudit('PURGE_PAYMENTS', 'AR_Payments', 0, '', `入金データ全件削除: ${deleted}件削除`, '', '');
  document.querySelector('.main-content').innerHTML = renderPayments();
}

async function importBankPayments() {
  if (window._bankImporting) return;           // ← 二重実行防止
  const items = window._pendingBankImport;
  if (!items || items.length === 0) return;

  window._bankImporting = true;                // ← ロック
  window._pendingBankImport = null;            // ← 即クリアして再クリック無効化
  const btn = document.getElementById('btnImportBank');
  if (btn) { btn.disabled = true; btn.textContent = '取り込み中...'; }
  setStatus('loading', `${items.length}件を取り込み中...`);

  try {
    // Name matching
    const matched = items.map(item => {
      const match = findNameMatch(item.PayerNameRaw);
      return {
        ...item,
        MatchedBillingCode: match?.BillingCode || '',
        MatchedBillingName: match?.BillingName || '',
        CompanyCode: match?.CompanyCode || '',
        MatchConfidence: match?.confidence || '不明',
        MatchReason: match?.reason || '',
        Status: match?.confidence === '確定' ? '自動候補あり' : '未処理',
      };
    });

    // Batch create in SharePoint
    let created = 0;
    for (const item of matched) {
      // Build note from TransType + Tekiyou (not SP columns)
      const noteParts = [item.TransType, item.Tekiyou].filter(Boolean);
      const { TransType, Tekiyou, ...spFields } = item;
      const newItem = await spCreateItem(SP.payments, {
        Title: `PAY-${item.TransDate}-${Date.now()}`,
        ...spFields,
        Note: noteParts.length > 0 ? noteParts.join(' / ') : '',
      });
      DATA.payments.push(newItem);
      created++;
      if (created % 10 === 0) setStatus('loading', `取り込み中... ${created}/${matched.length}`);
    }

    await logAudit('取込', 'AR_Payments', null, '', `銀行CSV取込: ${created}件`, null, { count: created });

    setStatus('success', `取り込み完了: ${created}件`);
    renderPage();
  } catch(e) {
    console.error(e);
    setStatus('error', '取り込みエラー: ' + e.message);
  } finally {
    window._bankImporting = false;             // ← 必ずロック解除
  }
}

// ============================================================
// NAME MATCHING
// ============================================================
function findNameMatch(payerName) {
  if (!payerName) return null;
  const norm = payerName.trim().toUpperCase();

  // Exact match from name dict
  for (const entry of DATA.namedict) {
    if (!entry.IsActive && entry.IsActive !== undefined) continue;
    const pattern = (entry.PayerPattern || '').toUpperCase();
    if (pattern && norm.includes(pattern)) {
      return {
        BillingCode: entry.BillingCode,
        BillingName: entry.BillingName,
        CompanyCode: entry.CompanyCode,
        confidence: '確定',
        reason: `名寄せ辞書: "${entry.PayerPattern}" (${entry.MatchType})`,
      };
    }
  }

  // Fuzzy match from masters (if loaded)
  const normPayer = normalizePayerName(payerName);
  if (DATA.masters.length > 0 && normPayer) {
    let bestScore = 0, bestMaster = null;
    for (const m of DATA.masters) {
      const masterNorm = normalizePayerName(m.CustName || m.BillingName || '');
      const score = fuzzyScore(normPayer, masterNorm);
      if (score > bestScore) { bestScore = score; bestMaster = m; }
    }
    if (bestMaster && bestScore >= 0.7) {
      return {
        BillingCode: bestMaster.BillingCode || bestMaster.CustCode,
        BillingName: bestMaster.CustName || bestMaster.BillingName,
        CompanyCode: companyCode(bestMaster.CustCode),
        confidence: bestScore >= 0.9 ? '高' : '中',
        reason: `マスタ照合: スコア ${(bestScore * 100).toFixed(0)}%`,
      };
    }
  }

  return null;
}

async function handleBillingPaste() {
  const text = document.getElementById('billingPaste')?.value;
  if (!text?.trim()) return;
  const rows = parseTSV(text);

}

function processBillingRows(rows) {
  const preview = document.getElementById('billingImportPreview');
  try {
    // Skip header rows (first 3), 4th row = header
    let headerIdx = -1;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      if (rows[i].some(c => c.includes('コード') || c.includes('得意先'))) {
        headerIdx = i; break;
      }
    }
    if (headerIdx < 0) headerIdx = 3; // Default

    const numCols = rows[headerIdx].length;
    const isDetailed = numCols >= 17;

    // Extract billing month and closing day from header rows
    // e.g. "2026年 2月10日締" → closingYM="2026-02", closingDay=10
    // Search up to 5 rows to be safe (header can be in different positions)
    let closingYM = '', closingDay = 0;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      const text = rows[i].join(' ');
      // Pattern 1: "2026年 2月10日締" (full pattern with closing day)
      const m = text.match(/(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日締/);
      if (m) {
        closingYM = `${m[1]}-${m[2].padStart(2,'0')}`;
        closingDay = parseInt(m[3], 10);
        break;
      }
      // Pattern 2: "2月10日" without 締 but with year elsewhere
      const m1b = text.match(/(\d{4})年/);
      const m1c = text.match(/(\d{1,2})月\s*(\d{1,2})日/);
      if (m1b && m1c) {
        closingYM = `${m1b[1]}-${m1c[1].padStart(2,'0')}`;
        closingDay = parseInt(m1c[2], 10);
        break;
      }
      // Fallback: month only (no closing day)
      const m2 = text.match(/(\d{4})年\s*(\d{1,2})月/);
      if (m2) { closingYM = `${m2[1]}-${m2[2].padStart(2,'0')}`; break; }
    }
    // If closingDay is still 0 but closingYM detected, try to infer from DueDate later
    console.log('[AR] ClosingDay extraction:', { closingYM, closingDay });

    // Parse data rows
    const dataRows = rows.slice(headerIdx + 1);
    const items = [];
    let currentParent = null;

    for (const r of dataRows) {
      if (r.length < 5) continue;
      const raw = r[0] || '';
      if (raw.includes('総合計') || raw.includes('【')) continue; // Skip summary row

      // Parent code detection
      if (raw.includes('<') || raw.includes('＜')) {
        currentParent = raw.replace(/[<>＜＞\s]/g, '').padStart(6, '0');
        continue;
      }

      const custCode = String(raw).replace(/\D/g, '').padStart(6, '0');
      if (custCode === '000000' || custCode.length !== 6) continue;

      const billingCode = currentParent || custCode;
      const name = r[1] || '';

      // Map columns based on mode
      let item;
      if (isDetailed) {
        // Detailed 18-col mode
        item = {
          CustCode: custCode, BillingCode: billingCode, BillingName: name,
          CompanyCode: companyCode(custCode), ClosingYM: closingYM,
          SalesRepCode: r[2] || '', SalesRepName: r[3] || '',
          PaymentTerms: r[5] || '', SlipCount: parseInt(r[6]) || 0,
          PrevBalance: parseInt(String(r[7]).replace(/[,\s]/g,'')) || 0,
          GrossSales: parseInt(String(r[11]).replace(/[,\s]/g,'')) || 0,
          ReturnsAmount: parseInt(String(r[12]).replace(/[,\s]/g,'')) || 0,
          DiscountAmount: parseInt(String(r[13]).replace(/[,\s]/g,'')) || 0,
          NetSales: parseInt(String(r[14]).replace(/[,\s]/g,'')) || 0,
          TaxAmount: parseInt(String(r[15]).replace(/[,\s]/g,'')) || 0,
          SalesInTax: parseInt(String(r[16]).replace(/[,\s]/g,'')) || 0,
          CurrentBilling: parseInt(String(r[17]).replace(/[,\s]/g,'')) || 0,
        };
      } else {
        // Normal 13-col SMILE mode:
        // r[0]:コード r[1]:得意先名 r[2]:担当者コード r[3]:担当者名 r[4]:回収予定日
        // r[5]:前回請求残高 r[6]:今回入金額 r[7]:値引調整額 r[8]:繰越残高
        // r[9]:税抜売上額 r[10]:消費税額 r[11]:税込売上額 r[12]:今回請求残高
        const pInt = s => parseInt(String(s).replace(/[,\s]/g, ''), 10) || 0;
        item = {
          CustCode: custCode, BillingCode: billingCode, BillingName: name,
          CompanyCode: companyCode(custCode), ClosingYM: closingYM,
          SalesRepCode: r[2] || '', SalesRepName: r[3] || '',
          PrevBalance: pInt(r[5]),
          NetSales: pInt(r[9]),
          TaxAmount: pInt(r[10]),
          SalesInTax: pInt(r[11]),
          CurrentBilling: pInt(r[12]),
        };
      }

      // DueDate handling
      const dueDateRaw = r[4] || '';
      if (dueDateRaw.includes('未') || dueDateRaw.includes('未定')) {
        item.DueDate = null;
      } else if (dueDateRaw.includes('末')) {
        const dm = dueDateRaw.match(/(\d{4})\/?(\d{1,2})/);
        if (dm) {
          const lastDay = new Date(parseInt(dm[1]), parseInt(dm[2]), 0).getDate();
          item.DueDate = `${dm[1]}-${dm[2].padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
        }
      } else {
        const dm = dueDateRaw.match(/(\d{4})\/?(\d{1,2})\/?(\d{1,2})/);
        if (dm) item.DueDate = `${dm[1]}-${dm[2].padStart(2,'0')}-${dm[3].padStart(2,'0')}`;
      }

      // Auto-detect TxType + closing day
      item.TxType = '通常';
      if (closingDay > 0) item.ClosingDay = closingDay;
      item.MatchStatus = '未処理';

      items.push(item);
    }

    // Check duplicates (include ClosingDay to allow same customer with different closing dates)
    const existing = new Set(DATA.ledger.map(l => `${l.CustCode}|${l.ClosingYM}|${l.ClosingDay || 0}`));
    const newItems = items.filter(i => !existing.has(`${i.CustCode}|${i.ClosingYM}|${i.ClosingDay || 0}`));
    const dupes = items.length - newItems.length;

    preview.innerHTML = `
      <div class="cp-result ${newItems.length > 0 ? 'pass' : 'fail'}">
        <div class="cp-title">解析結果: ${items.length}件（新規: ${newItems.length}件、重複: ${dupes}件）</div>
        <div class="cp-detail">モード: ${isDetailed ? '詳細(18列)' : '普通(13列)'} / 締年月: ${closingYM || '未検出'}</div>
      </div>
      ${newItems.length > 0 ? `
      <div class="import-preview">
        <table class="data-table">
          <thead><tr><th>コード</th><th>得意先名</th><th class="text-right">前回残高</th><th class="text-right">今回請求</th></tr></thead>
          <tbody>${newItems.slice(0, 30).map(i => `
            <tr>
              <td class="td-code">${escHtml(i.CustCode)}</td>
              <td class="truncate">${escHtml(i.BillingName)}</td>
              <td class="td-num">${fmtNum(i.PrevBalance)}</td>
              <td class="td-num">${fmtNum(i.CurrentBilling)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <button class="btn btn-primary mt-8" id="btnImportBilling" onclick="importBillingItems()">取り込み実行（${newItems.length}件）</button>
      ` : ''}
    `;

    window._pendingBillingImport = newItems;
  } catch(e) {
    preview.innerHTML = `<div class="cp-result fail"><div class="cp-title">解析エラー: ${escHtml(e.message)}</div></div>`;
  }
}

  }
}

// 名寄せ辞書から過去の消込・控除パターンを参考表示
function buildNameDictHintHtml(pay) {
  const payerName = (pay.PayerNameRaw || pay.DensaiDebtorName || '').trim();
  if (!payerName) return '';
  const normPayer = normalizePayerName(payerName);
  const matches = DATA.namedict.filter(d => d.IsActive !== false && normalizePayerName(d.PayerPattern) === normPayer);
  if (matches.length === 0) return '';
  const hints = matches.map(m => {
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">`;
    html += `<div><span style="font-weight:600">${escHtml(m.BillingCode || '')}</span> ${escHtml(m.BillingName || '')}</div>`;

function buildAmountCandidatesHtml(pay, unmatchedLedger, autoCandidates) {
  const amt = Number(pay.Amount) || 0;
  if (amt <= 0) return '';

  // Exclude items already shown in auto candidates
  const autoSpIds = new Set(autoCandidates.map(l => l._spId));
  const remaining = unmatchedLedger.filter(l => !autoSpIds.has(l._spId));

  // Exact match
  const exact = remaining.filter(l => Number(l.CurrentBilling) === amt);
  // Near match: within ±1% or ±1000 (whichever is larger) — covers typical bank fees
  const tolerance = Math.max(amt * 0.01, 1000);
  const near = remaining.filter(l => {
    const b = Number(l.CurrentBilling) || 0;
    const diff = Math.abs(b - amt);
    return diff > 0 && diff <= tolerance && !exact.includes(l);
  }).sort((a, b) => Math.abs((Number(a.CurrentBilling)||0) - amt) - Math.abs((Number(b.CurrentBilling)||0) - amt))
    .slice(0, 10);

  if (exact.length === 0 && near.length === 0) return '';

  // If there are already auto candidates from name matching, make this collapsed
  const collapsed = autoCandidates.length > 0;

  const renderRows = (items) => items.map(l => {
    const diff = (Number(l.CurrentBilling) || 0) - amt;
    const diffText = diff === 0 ? '<span style="color:var(--success);font-weight:600">一致</span>'
      : `<span style="color:var(--warn)">${diff > 0 ? '+' : ''}¥${fmtNum(diff)}</span>`;
    return `
      <tr id="rc_row_${l._spId}" onclick="toggleBillingSelection('${l._spId}', event)" style="cursor:pointer">
        <td><input type="checkbox" class="rc-billing-cb" data-spid="${l._spId}" data-amount="${l.CurrentBilling || 0}"></td>
        <td class="td-code">${escHtml(l.CustCode)}</td>
        <td class="truncate">${escHtml(l.BillingName)}</td>
        <td class="td-muted">${l.ClosingYM}</td>
        <td class="td-num">¥${fmtNum(l.CurrentBilling)}</td>
        <td class="td-num">${diffText}</td>
      </tr>`;
  }).join('');

  return `
    <div style="margin-bottom:12px">
      <div class="form-label" style="font-size:11px;color:var(--text-muted);cursor:pointer" onclick="document.getElementById('rc_amtCandidates').classList.toggle('hidden')">
        💰 金額候補（${exact.length + near.length}件） ${collapsed ? '▶ クリックで展開' : ''}
      </div>
      <div id="rc_amtCandidates" ${collapsed ? 'class="hidden"' : ''}>
        <table class="data-table">
          <thead><tr><th style="width:40px">✓</th><th>コード</th><th>得意先名</th><th>締年月</th><th class="text-right">請求額</th><th class="text-right">差額</th></tr></thead>
          <tbody>
            ${renderRows(exact)}
            ${near.length > 0 ? renderRows(near) : ''}
          </tbody>
        </table>
      </div>
    </div>`;
}

function toggleBillingSelection(spId, evt) {
  const cb = document.querySelector(`.rc-billing-cb[data-spid="${spId}"]`);
  if (!cb) return;
  // チェックボックス自体のクリックはブラウザが自動トグルするので二重にしない
  if (!evt || evt.target !== cb) cb.checked = !cb.checked;
  const row = document.getElementById('rc_row_' + spId);
  if (row) row.style.background = cb.checked ? '#EAF3DE' : '';
  updateBillingSelectionSummary();
}

function updateBillingSelectionSummary() {
  const pay = window._selectedPayment;
  if (!pay) return;

  const checks = document.querySelectorAll('.rc-billing-cb:checked');
  const selectedItems = [];
  let totalBilling = 0;
  checks.forEach(cb => {
    const spId = cb.dataset.spid;
    const item = DATA.ledger.find(l => l._spId === spId);
    if (item) {
      selectedItems.push(item);
      totalBilling += Number(item.CurrentBilling) || 0;
    }
  });
  window._selectedBillings = selectedItems;

  const summary = document.getElementById('rc_selectedSummary');
  const confirmBtn = document.getElementById('rc_multiConfirm');

  if (selectedItems.length === 0) {
    summary.style.display = 'none';
    confirmBtn.style.display = 'none';
    return;
  }

  // Get existing adjustment values if already rendered
  const existingFee = document.getElementById('rc_multiFee')?.value || '0';
  const existingDiscount = document.getElementById('rc_multiDiscount')?.value || '0';
  const existingOther = document.getElementById('rc_multiOther')?.value || '0';

  const adjTotal = (parseInt(existingFee) || 0) + (parseInt(existingDiscount) || 0) + (parseInt(existingOther) || 0);
  const diff = pay.Amount + adjTotal - totalBilling;
  const diffColor = diff === 0 ? 'var(--success)' : 'var(--danger)';
  const diffLabel = diff === 0 ? '一致' : (diff > 0 ? `過入金 +¥${fmtNum(diff)}` : `不足 ¥${fmtNum(diff)}`);

  summary.style.display = 'block';
  summary.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div>
        <strong>${selectedItems.length}件選択中</strong>
        <span style="margin-left:8px">請求合計: <strong>¥${fmtNum(totalBilling)}</strong></span>
      </div>
      <div style="font-size:14px;font-weight:700;color:${diffColor}">
        入金¥${fmtNum(pay.Amount)}${adjTotal ? ` + 調整¥${fmtNum(adjTotal)}` : ''} − 請求¥${fmtNum(totalBilling)} = ${diffLabel}
      </div>
    </div>
    ${selectedItems.length >= 2 ? `
    <div style="display:flex;gap:8px;margin-top:8px;align-items:end">
      <div style="flex:1"><div style="font-size:10px;color:var(--text-muted)">支払手数料</div><input class="form-input" id="rc_multiFee" type="number" value="${existingFee}" style="font-size:12px;padding:4px 8px" oninput="updateBillingSelectionSummary()"></div>
      <div style="flex:1"><div style="font-size:10px;color:var(--text-muted)">売上割引</div><input class="form-input" id="rc_multiDiscount" type="number" value="${existingDiscount}" style="font-size:12px;padding:4px 8px" oninput="updateBillingSelectionSummary()"></div>
      <div style="flex:1"><div style="font-size:10px;color:var(--text-muted)">その他調整</div><input class="form-input" id="rc_multiOther" type="number" value="${existingOther}" style="font-size:12px;padding:4px 8px" oninput="updateBillingSelectionSummary()"></div>
    </div>` : '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">1件だけなら詳細入力画面で調整額も入力可</div>'}
  `;

  confirmBtn.style.display = 'inline-flex';
  confirmBtn.textContent = selectedItems.length === 1 ? '詳細入力へ →' : `消込確定（${selectedItems.length}件）`;
}

async function confirmMultiReconcile() {
  const pay = window._selectedPayment;
  const billings = window._selectedBillings || [];
  if (!pay || billings.length === 0) return;

  // 1件選択なら従来の詳細入力画面へ
  if (billings.length === 1) {
    selectBillingForPayment(billings[0]._spId);
    return;
  }

  // 複数件: 各売掛に入金を按分、調整額は最後の1件に集約
  const multiFee = parseInt(document.getElementById('rc_multiFee')?.value) || 0;
  const multiDiscount = parseInt(document.getElementById('rc_multiDiscount')?.value) || 0;
  const multiOther = parseInt(document.getElementById('rc_multiOther')?.value) || 0;
  const multiAdj = multiFee + multiDiscount + multiOther;
  const totalBilling = billings.reduce((s, b) => s + (Number(b.CurrentBilling) || 0), 0);
  const finalDiff = pay.Amount + multiAdj - totalBilling;

  let confirmMsg = `${billings.length}件の売掛に対して入金 ¥${fmtNum(pay.Amount)} を消込します。`;
  if (multiAdj) confirmMsg += `\n調整額: ¥${fmtNum(multiAdj)}（手数料:${multiFee} 割引:${multiDiscount} 他:${multiOther}）`;
  if (finalDiff !== 0) confirmMsg += `\n⚠️ 差額 ¥${fmtNum(finalDiff)} が発生します（繰越残高に反映）。`;
  confirmMsg += '\nよろしいですか？';
  if (!confirm(confirmMsg)) return;

  try {
    setStatus('loading', `${billings.length}件の消込を保存中...`);
    const applied = window._appliedPayments || [];

    for (let idx = 0; idx < billings.length; idx++) {
      const item = billings[idx];
      const billing = Number(item.CurrentBilling) || 0;
      const isLast = idx === billings.length - 1;
      // 調整額は最後の1件にまとめる
      const fee = isLast ? multiFee : 0;
      const discount = isLast ? multiDiscount : 0;
      const other = isLast ? multiOther : 0;
      const adjTotal = fee + discount + other;
      const payAmount = billing - adjTotal;
      const nextBalance = isLast ? finalDiff : 0;

      const fields = {
        PayTransfer: pay.DataSource === 'でんさい' ? 0 : payAmount,
        PayDensai: pay.DataSource === 'でんさい' ? payAmount : 0,
        PayCashAmt: 0, AdjOffset: 0,
        AdjDiscount: discount, AdjFee: fee,
        AdjPromo: 0, AdjOther: other, AdjFxGainLoss: 0,
        PayTotal: payAmount, AdjTotal: adjTotal,
        NextMonthBalance: nextBalance,
        Discrepancy: 0,
        MatchStatus: nextBalance === 0 ? '消込済' : '要確認',
        MatchDate: new Date().toISOString(),
        MatchedBy: account?.name || '',
        PayerNameUsed: pay.PayerNameRaw || pay.DensaiDebtorName || '',
        LinkedPaymentIds: pay._spId,
        MatchMethod: pay.DataSource === 'でんさい' ? 'でんさい' : '振込',
        ReconcileNote: `一括消込（${billings.length}件）入金¥${fmtNum(pay.Amount)}${multiAdj ? ` 調整¥${fmtNum(multiAdj)}` : ''}`,
      };
      await spUpdateItem(SP.ledger, item._spId, fields);
      Object.assign(item, fields);
    }

    // Update payment status
    for (const ap of applied) {
      const p = DATA.payments.find(pp => pp._spId === ap.spId);
      if (p) {
        try {
          await spUpdateItem(SP.payments, ap.spId, { Status: '消込済', MatchedLedgerId: billings.map(b => b.ID).join(',') });
          p.Status = '消込済';
        } catch(e) { console.error('Payment link error:', e); }
      }
    }
    // 名寄せ辞書に自動登録（各売掛に対して・調整情報付き）
    const adjInfo = (multiFee || multiDiscount || multiOther) ? { fee: multiFee, discount: multiDiscount, other: multiOther } : null;
    for (const item of billings) {
      await autoRegisterNameDict(applied, item, adjInfo);
    }

    window._appliedPayments = [];
    window._selectedBillings = [];

    await logAudit('消込', 'AR_Ledger', null, billings[0]?.BillingCode || '',
      `一括消込: ${billings.length}件 入金¥${fmtNum(pay.Amount)} 振込人:${pay.PayerNameRaw || ''}`, null, null);

    closeModal();
    setStatus('success', `消込完了: ${billings.length}件 — ${pay.PayerNameRaw || ''}`);
    renderPage();
  } catch(e) {
    console.error(e);
    setStatus('error', '消込エラー: ' + e.message);
  }
}

function searchBillingForPayment() {
  const rawQ = document.getElementById('rc_billingSearch')?.value || '';
  const container = document.getElementById('rc_billingSearchResults');
  if (!container || !rawQ.trim()) { if (container) container.innerHTML = ''; return; }

  const normQ = normalizeForSearch(rawQ);
  const unmatchedLedger = DATA.ledger.filter(l => l.MatchStatus === '未処理' || !l.MatchStatus);
  const results = unmatchedLedger.filter(l => {
    const normName = normalizeForSearch(l.BillingName || '');
    const normCode = (l.CustCode || '').toUpperCase();
    const normBillingCode = (l.BillingCode || '').toUpperCase();
    return normName.includes(normQ) || normCode.includes(normQ) || normBillingCode.includes(normQ);
  }).slice(0, 20);

  container.innerHTML = results.length === 0 ? '<div class="text-muted" style="font-size:12px;padding:8px">該当する請求が見つかりません</div>' : `
    <table class="data-table">
      <thead><tr><th style="width:40px">✓</th><th>コード</th><th>得意先名</th><th>締年月</th><th class="text-right">請求額</th></tr></thead>
      <tbody>${results.map(l => {
        const alreadyChecked = (window._selectedBillings || []).some(b => b._spId === l._spId);
        return `
        <tr id="rc_row_${l._spId}" onclick="toggleBillingSelection('${l._spId}', event)" style="cursor:pointer;${alreadyChecked ? 'background:#EAF3DE' : ''}">
          <td><input type="checkbox" class="rc-billing-cb" data-spid="${l._spId}" data-amount="${l.CurrentBilling || 0}" ${alreadyChecked ? 'checked' : ''}></td>

          <td class="td-muted">${l.ClosingYM}</td>

        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input class="form-input" id="rc_paySearch" placeholder="依頼人名で検索..." style="flex:1" oninput="filterReconcilePayments()">
      <input class="form-input" id="rc_payAmountSearch" placeholder="金額で検索..." type="number" style="width:140px" oninput="filterReconcilePayments()">
    </div>
    <div id="rc_paySearchResults" style="max-height:200px;overflow-y:auto"></div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-success" id="rc_confirm" onclick="confirmReconcile('${spId}')">消込確定</button>
    </div>
  `;

  // Auto-calculate on input + comma formatting for amount fields
  modal.querySelectorAll('.rc-amt').forEach(el => {
    el.addEventListener('input', () => updateReconcileCalc(item));
    el.addEventListener('focus', () => {
      // フォーカス時: カンマを外して生数字に
      const raw = parseInt(String(el.value).replace(/[,\s]/g, ''), 10) || 0;
      el.value = raw === 0 ? '' : String(raw);
      el.select();
    });
    el.addEventListener('blur', () => {
      // ブラー時: カンマ区切りに戻す
      const raw = parseInt(String(el.value).replace(/[,\s]/g, ''), 10) || 0;
      el.value = fmtNum(raw);
    });
  });
  updateReconcileCalc(item);
  showModal();
}

// カンマ入りテキストから数値を取得するヘルパー
function rcVal(id) {
  const el = document.getElementById(id);
  return parseInt(String(el?.value || '0').replace(/[,\s]/g, ''), 10) || 0;
}

function updateReconcileCalc(item) {
  const v = rcVal;
  const payTotal = v('rc_PayTransfer') + v('rc_PayDensai') + v('rc_PayCashAmt');
  const adjTotal = v('rc_AdjOffset') + v('rc_AdjDiscount') + v('rc_AdjFee') + v('rc_AdjPromo') + v('rc_AdjOther') + v('rc_AdjFxGainLoss');
  const billing = Number(item.CurrentBilling) || 0;
  const nextBalance = billing - payTotal - adjTotal;

  document.getElementById('rc_calc').innerHTML = `
    請求額: ¥${fmtNum(billing)} − 入金合計: ¥${fmtNum(payTotal)} − 調整合計: ¥${fmtNum(adjTotal)} = <strong style="color:${nextBalance === 0 ? 'var(--success)' : 'var(--danger)'}">次月繰越: ¥${fmtNum(nextBalance)}</strong>
  `;

  const btn = document.getElementById('rc_confirm');
  if (btn) btn.disabled = false;
}

// Search unmatched payments in reconcile modal
function filterReconcilePayments() {
  const rawNameQ = document.getElementById('rc_paySearch')?.value || '';
  const amtQ = document.getElementById('rc_payAmountSearch')?.value || '';
  const container = document.getElementById('rc_paySearchResults');
  if (!container) return;

  if (!rawNameQ && !amtQ) { container.innerHTML = ''; return; }

  const normQ = normalizeForSearch(rawNameQ);
  let results = DATA.payments.filter(p => p.Status !== '消込済' && p.Status !== '対象外');
  if (normQ) results = results.filter(p =>
    normalizeForSearch(p.PayerNameRaw || '').includes(normQ) ||
    normalizeForSearch(p.PayerNameNorm || '').includes(normQ) ||
    normalizeForSearch(p.Note || '').includes(normQ)
  );
  if (amtQ) {
    const amt = parseInt(amtQ, 10);
    if (!isNaN(amt)) results = results.filter(p => String(p.Amount).includes(String(amt)));
  }
  results = results.slice(0, 20);

  container.innerHTML = results.length === 0 ? '<div class="text-muted" style="font-size:12px;padding:8px">該当なし</div>' : `
    <table class="data-table">
      <thead><tr><th>日付</th><th>ソース</th><th>依頼人</th><th class="text-right">金額</th><th>選択</th></tr></thead>
      <tbody>${results.map(p => `
        <tr>
          <td class="td-muted">${fmtDate(p.TransDate)}</td>
          <td><span class="badge badge-blue">${escHtml(p.DataSource || '')}</span></td>
          <td class="truncate">${escHtml(p.PayerNameRaw || p.DensaiDebtorName || '')}</td>
          <td class="td-num">¥${fmtNum(p.Amount)}</td>
          <td><button class="btn btn-primary btn-sm" onclick="applyPaymentToReconcile('${p._spId}', ${p.Amount}, '${p.DataSource}')">適用</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// Track applied payments for learning data
window._appliedPayments = window._appliedPayments || [];

function applyPaymentToReconcile(paySpId, amount, source) {
  const field = source === 'でんさい' ? 'rc_PayDensai' : 'rc_PayTransfer';
  const el = document.getElementById(field);
  if (el) el.value = fmtNum(rcVal(field) + amount);
  el.dispatchEvent(new Event('input'));

  // Track which payment was applied
  const pay = DATA.payments.find(p => p._spId === paySpId);
  if (pay) {
    if (!window._appliedPayments) window._appliedPayments = [];
    window._appliedPayments.push({
      spId: paySpId,
      payerNameRaw: pay.PayerNameRaw || pay.DensaiDebtorName || '',
      amount: amount,
      source: source,
      dataSource: pay.DataSource,
    });
  }
}

async function confirmReconcile(spId) {
  const item = DATA.ledger.find(l => l._spId === spId);
  if (!item) return;

  const v = rcVal;
  const fields = {
    PayTransfer: v('rc_PayTransfer'),
    PayDensai: v('rc_PayDensai'),
    PayCashAmt: v('rc_PayCashAmt'),
    AdjOffset: v('rc_AdjOffset'),
    AdjDiscount: v('rc_AdjDiscount'),
    AdjFee: v('rc_AdjFee'),
    AdjPromo: v('rc_AdjPromo'),
    AdjOther: v('rc_AdjOther'),
    AdjFxGainLoss: v('rc_AdjFxGainLoss'),
    ReconcileNote: document.getElementById('rc_Note')?.value || '',
  };

  fields.PayTotal = fields.PayTransfer + fields.PayDensai + fields.PayCashAmt;
  fields.AdjTotal = fields.AdjOffset + fields.AdjDiscount + fields.AdjFee + fields.AdjPromo + fields.AdjOther + fields.AdjFxGainLoss;
  fields.NextMonthBalance = (Number(item.CurrentBilling) || 0) - fields.PayTotal - fields.AdjTotal;
  fields.Discrepancy = 0;
  fields.MatchStatus = fields.NextMonthBalance === 0 ? '消込済' : '要確認';
  fields.MatchDate = new Date().toISOString();
  fields.MatchedBy = account?.name || '';

  // Learning data: save which payer names were used for this reconciliation
  const applied = window._appliedPayments || [];
  if (applied.length > 0) {
    fields.PayerNameUsed = applied.map(a => a.payerNameRaw).filter(Boolean).join(' | ');
    fields.LinkedPaymentIds = applied.map(a => a.spId).join(',');
    fields.MatchMethod = applied.some(a => a.source === 'でんさい') ? 'でんさい' : '振込';
  }

  try {
    setStatus('loading', '消込を保存中...');
    await spUpdateItem(SP.ledger, spId, fields);
    Object.assign(item, fields);

    // Update linked payment statuses
    for (const ap of applied) {
      const pay = DATA.payments.find(p => p._spId === ap.spId);
      if (pay) {
        try {
          await spUpdateItem(SP.payments, ap.spId, { Status: '消込済', MatchedLedgerId: parseInt(item.ID) || 0 });
          pay.Status = '消込済';
          pay.MatchedLedgerId = item.ID;
        } catch(e) { console.error('Payment link error:', e); }
      }
    }
    window._appliedPayments = [];

    // 名寄せ辞書に自動登録（振込依頼人名 → 請求先コード・調整情報付き）
    const adjInfo1to1 = (fields.AdjFee || fields.AdjDiscount || fields.AdjOther) ?
      { fee: fields.AdjFee, discount: fields.AdjDiscount, other: fields.AdjOther } : null;
    await autoRegisterNameDict(applied, item, adjInfo1to1);

    await logAudit('消込確定', 'AR_Ledger', item.ID, item.CustCode, `消込: PayTotal=${fields.PayTotal}, AdjTotal=${fields.AdjTotal}, 次月繰越=${fields.NextMonthBalance}, 依頼人=${fields.PayerNameUsed || '手入力'}`);
    setStatus('success', `消込保存完了: ${item.CustCode} ${item.BillingName}`);
    closeModal();
    renderPage();
  } catch(e) {
    setStatus('error', '消込エラー: ' + e.message);
  }
}

async function autoRegisterNameDict(appliedPayments, ledgerItem, adjustmentInfo) {
  if (!appliedPayments || appliedPayments.length === 0) return;
  for (const ap of appliedPayments) {
    const payerName = (ap.payerNameRaw || '').trim();
    if (!payerName) continue;

    // Build adjustment note (手数料/割引/その他)
    const adjParts = [];
    if (adjustmentInfo) {
      if (adjustmentInfo.fee)      adjParts.push(`手数料:¥${fmtNum(adjustmentInfo.fee)}`);
      if (adjustmentInfo.discount) adjParts.push(`割引:¥${fmtNum(adjustmentInfo.discount)}`);
      if (adjustmentInfo.other)    adjParts.push(`その他:¥${fmtNum(adjustmentInfo.other)}`);
    }
    const adjNote = adjParts.length > 0 ? adjParts.join(' / ') : '';

    // Check if already in dictionary
    const normPayer = normalizePayerName(payerName);
    const billingCode = ledgerItem.BillingCode || ledgerItem.CustCode;
    const existing = DATA.namedict.find(d =>
      normalizePayerName(d.PayerPattern) === normPayer && d.BillingCode === billingCode
    );
    if (existing) {
      // Update hit count + last adjustment info
      try {
        const newHit = (parseInt(existing.HitCount) || 0) + 1;
        const updateFields = { HitCount: newHit };
        if (adjNote) {
          updateFields.LastAdjustment = adjNote;
          updateFields.LastAdjustmentDate = new Date().toISOString();
        }
        await spUpdateItem(SP.namedict, existing._spId, updateFields);
        existing.HitCount = newHit;
        if (adjNote) {
          existing.LastAdjustment = adjNote;
          existing.LastAdjustmentDate = updateFields.LastAdjustmentDate;
        }
      } catch(e) { console.error('NameDict hit update error:', e); }
      continue;
    }

    // New entry: register
    try {
      const regFields = {
        Title: `ND-${Date.now()}`,
        PayerPattern: payerName,
        MatchType: '銀行名義',
        BillingCode: billingCode,
        BillingName: ledgerItem.BillingName || '',
        CompanyCode: ledgerItem.CompanyCode || '',
        HitCount: 1,
        IsActive: true,
        Source: '消込自動登録',
        CreatedBy: account?.name || '',
        CreatedDate: new Date().toISOString(),
      };
      if (adjNote) {
        regFields.LastAdjustment = adjNote;
        regFields.LastAdjustmentDate = new Date().toISOString();
      }
      const newItem = await spCreateItem(SP.namedict, regFields);
      DATA.namedict.push(newItem);
      console.log(`[AR] 名寄せ辞書に自動登録: ${payerName} → ${billingCode} ${ledgerItem.BillingName}${adjNote ? ' ' + adjNote : ''}`);
    } catch(e) { console.error('NameDict auto-register error:', e); }
  }
}

function generateSmileCsv(mode) {
  const isHistory = mode === 'history';
  const exportable = isHistory
    ? DATA.ledger.filter(l => l.MatchStatus === 'SMILEエクスポート済' || l.MatchStatus === 'SMILE入力済')
    : DATA.ledger.filter(l => l.MatchStatus === '消込済');
  if (exportable.length === 0) { alert(isHistory ? 'エクスポート済みデータがありません。' : '消込済のレコードがありません。'); return; }

  // Build CSV lines
  const header = '伝票日付,伝票№,処理連番,行,得意先コード,得意先名1,得意先名2,部門コード,営業所コード,取引区分,取引区分属性,入金額,決済予定日,備考コード,備考,データ発生区分,相手処理連番';
  const lines = [header];

  // Mapping: field → [SMILE取引区分, SMILE属性, isPayment, remarkText]
  const SMILE_MAP = [
    ['PayTransfer',    2,  2, true,  '振込'],
    ['PayDensai',      4,  4, true,  'でんさい'],
    ['PayCashAmt',     1,  1, true,  '現金'],
    ['AdjOffset',      3,  3, false, '相殺'],
    ['AdjDiscount',   12,  6, false, '売上割引料'],
    ['AdjFee',        13,  6, false, '支払手数料'],
    ['AdjPromo',       9,  6, false, '販促費'],
    ['AdjOther',       6,  6, false, 'その他調整'],
    ['AdjFxFee',      17,  6, false, '海外送金手数料'],
  ];

  let totalLines = 0;
  for (const item of exportable) {
    const date = (item.PaymentDate || item.MatchDate || new Date().toISOString()).substring(0, 10).replace(/-/g, '');
    let lineNo = 1;

    // Handle AdjFxGainLoss separately (positive = code 11, negative = code 10)
    const fxGL = Number(item.AdjFxGainLoss) || 0;

    for (const [field, txCode, txAttr, isPay, remark] of SMILE_MAP) {
      const amount = Number(item[field]) || 0;
      if (amount === 0) continue;

      const row = `${date},,,${String(lineNo).padStart(2,'0')},${item.CustCode},,,,,,${txCode},${txAttr},${Math.abs(amount)},${isPay && item.SettlementDate ? item.SettlementDate.replace(/-/g,'') : '0'},,${remark},0,0`;
      lines.push(row);
      lineNo++;
      totalLines++;
    }

    if (fxGL !== 0) {
      const fxCode = fxGL > 0 ? 11 : 10;
      const fxRemark = fxGL > 0 ? '為替差益' : '為替差損';
      lines.push(`${date},,,${String(lineNo).padStart(2,'0')},${item.CustCode},,,,,,${fxCode},6,${Math.abs(fxGL)},0,,${fxRemark},0,0`);
      totalLines++;
    }
  }

  // Create downloadable CSV
  // Shift-JIS encode for SMILE compatibility using encoding.js (loaded at top)
  const csvContent = lines.join('\r\n');
  let blob;
  if (typeof Encoding !== 'undefined') {
    // encoding.js available → proper Shift-JIS output
    const unicodeArray = Encoding.stringToCode(csvContent);
    const sjisArray = Encoding.convert(unicodeArray, 'SJIS', 'UNICODE');
    blob = new Blob([new Uint8Array(sjisArray)], { type: 'text/csv' });
  } else {
    // Fallback: UTF-8 with BOM (Excel-compatible)
    const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
    blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8' });
  }
  const url = URL.createObjectURL(blob);
  const now = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const filename = `SMILE_入金明細_${now}.csv`;

  const label = isHistory ? '再出力' : '新規';
  document.getElementById('smileExportResult').innerHTML = `
    <div class="cp-result pass">
      <div class="cp-title">${label} CSV生成完了: ${totalLines}行（${exportable.length}得意先）</div>
      <a href="${url}" download="${filename}" class="btn btn-success mt-8">📥 ${filename} をダウンロード</a>
    </div>
  `;

  // Mark as exported (skip for history re-export)
  if (!isHistory) markAsExported(exportable);
}

async function markAsExported(items) {
  for (const item of items) {
    try {
      await spUpdateItem(SP.ledger, item._spId, { MatchStatus: 'SMILEエクスポート済' });
      item.MatchStatus = 'SMILEエクスポート済';
    } catch(e) { console.error('Export status update error:', e); }
  }
  await logAudit('SMILEエクスポート', 'AR_Ledger', null, '', `${items.length}件エクスポート`);
}

function runCarryForwardCheck() {
  const result = document.getElementById('cp1_result');
  const ledger = DATA.ledger;

  // Group by CustCode + ClosingYM
  const byCustomer = {};
  ledger.forEach(l => {
    const key = l.CustCode;
    if (!byCustomer[key]) byCustomer[key] = [];
    byCustomer[key].push(l);
  });

  const mismatches = [];
  for (const [custCode, items] of Object.entries(byCustomer)) {
    const sorted = items.sort((a, b) => (a.ClosingYM || '').localeCompare(b.ClosingYM || ''));
    for (let i = 1; i < sorted.length; i++) {
      const prev = sorted[i-1];
      const curr = sorted[i];
      const prevNext = Number(prev.NextMonthBalance) || 0;
      const currPrev = Number(curr.PrevBalance) || 0;
      if (prevNext !== currPrev) {
        mismatches.push({
          custCode,
          name: curr.BillingName,
          prevYM: prev.ClosingYM,
          currYM: curr.ClosingYM,
          expected: prevNext,
          actual: currPrev,
          diff: currPrev - prevNext,
        });
      }
    }
  }

  if (mismatches.length === 0) {
    result.innerHTML = '<div class="cp-result pass"><div class="cp-title">✓ 全件一致</div><div class="cp-detail">全得意先の繰越残高が正常です。</div></div>';
  } else {
    result.innerHTML = `
      <div class="cp-result fail">
        <div class="cp-title">✗ ${mismatches.length}件の不一致</div>
      </div>
      <table class="data-table mt-8" style="font-size:11px">

async function runDensaiCheck(event) {
  const file = event.target.files[0];
  if (!file) return;

  const result = document.getElementById('cp2_result');
  try {
    const buffer = await file.arrayBuffer();
    const text = new TextDecoder('shift_jis').decode(buffer);
    const rows = parseCSV(text);

    // Parse densai CSV (record number is key)
    const csvRecords = {};
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (r.length < 7) continue;
      const recordNo = r[6]?.trim();
      if (!recordNo) continue;
      csvRecords[recordNo] = {
        amount: parseInt(String(r[2]).replace(/[,\s]/g, '')) || 0,
        dueDate: r[3] || '',
        debtorName: r[10] || '',
      };
    }

    // Compare with app data
    const appDensai = DATA.payments.filter(p => p.DataSource === 'でんさい');
    const appRecords = {};
    appDensai.forEach(p => { if (p.DensaiRecordNo) appRecords[p.DensaiRecordNo] = p; });

    const missing = [];  // In CSV but not in app
    const mismatched = [];  // In both but different
    const extra = [];  // In app but not in CSV

    for (const [recNo, csv] of Object.entries(csvRecords)) {
      if (!appRecords[recNo]) {
        missing.push({ recordNo: recNo, ...csv });
      } else {
        const app = appRecords[recNo];
        if (csv.amount !== Number(app.Amount)) {
          mismatched.push({ recordNo: recNo, csvAmount: csv.amount, appAmount: Number(app.Amount) });
        }
      }
    }

    for (const [recNo, app] of Object.entries(appRecords)) {
      if (!csvRecords[recNo]) extra.push({ recordNo: recNo, amount: app.Amount, name: app.DensaiDebtorName });
    }

    const ok = missing.length === 0 && mismatched.length === 0;
    result.innerHTML = `
      <div class="cp-result ${ok ? 'pass' : 'fail'}">
        <div class="cp-title">${ok ? '✓ 全件一致' : `✗ ${missing.length}件漏れ / ${mismatched.length}件金額不一致`}</div>
        <div class="cp-detail">CSV: ${Object.keys(csvRecords).length}件 / アプリ: ${appDensai.length}件</div>
      </div>
      ${missing.length > 0 ? `<div class="text-danger mt-8" style="font-size:12px;font-weight:600">入力漏れ（CSVにあるがアプリにない）:</div>
      <table class="data-table mt-8" style="font-size:11px"><thead><tr><th>記録番号</th><th>債務者名</th><th class="text-right">金額</th></tr></thead>
      <tbody>${missing.map(m => `<tr><td class="mono">${escHtml(m.recordNo)}</td><td>${escHtml(m.debtorName)}</td><td class="td-num">¥${fmtNum(m.amount)}</td></tr>`).join('')}</tbody></table>` : ''}
    `;

    logAudit('でんさい月次チェック', 'AR_Payments', null, '', `CSV:${Object.keys(csvRecords).length}件, 漏れ:${missing.length}, 不一致:${mismatched.length}`);
  } catch(e) {
    result.innerHTML = `<div class="cp-result fail"><div class="cp-title">エラー: ${escHtml(e.message)}</div></div>`;
  }
}

// ============================================================
function attachPageHandlers() {
  // File drop zones
  document.querySelectorAll('.file-drop').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const input = zone.querySelector('input[type="file"]');
      if (input && e.dataTransfer.files.length) {
        input.files = e.dataTransfer.files;
        input.dispatchEvent(new Event('change'));
      }
    });
  });
}

  } else {

async function savePaymentDetail(spId) {
  const p = DATA.payments.find(x => x._spId === spId);
  if (!p) return;

  const fields = {
    Status: document.getElementById('pd_status')?.value || p.Status,
    MatchedBillingCode: document.getElementById('pd_billingCode')?.value?.trim() || '',
  };

  // Look up billing name
  if (fields.MatchedBillingCode) {
    const match = DATA.ledger.find(l => l.CustCode === fields.MatchedBillingCode || l.BillingCode === fields.MatchedBillingCode);
    if (match) {
      fields.MatchedBillingName = match.BillingName;
      fields.CompanyCode = match.CompanyCode || companyCode(match.CustCode);
      fields.MatchConfidence = '確定';
      fields.MatchReason = '手動紐付け';
    }
  }

  try {
    setStatus('loading', '入金レコードを更新中...');
    await spUpdateItem(SP.payments, spId, fields);
    Object.assign(p, fields);

    // Register in name dict if manual match
    if (fields.MatchedBillingCode && p.PayerNameRaw && fields.MatchConfidence === '確定') {
      const exists = DATA.namedict.find(n => n.PayerPattern === p.PayerNameRaw);
      if (!exists) {
        window._suggestNameDict = { payer: p.PayerNameRaw, code: fields.MatchedBillingCode, name: fields.MatchedBillingName, company: fields.CompanyCode };
      }
    }

    await logAudit('入金更新', 'AR_Payments', p.ID, fields.MatchedBillingCode, `ステータス:${fields.Status}, 名寄せ:${fields.MatchedBillingName || '—'}`);
    setStatus('success', '入金レコード更新完了');
    closeModal();

    // Suggest adding to name dict
    if (window._suggestNameDict) {
      const nd = window._suggestNameDict;
      window._suggestNameDict = null;
      if (confirm(`「${nd.payer}」→「${nd.name}」を名寄せ辞書に登録しますか？`)) {
        await addToNameDict(nd.payer, nd.code, nd.name, nd.company, '銀行名義', '手動登録');
      }
    }

    renderPage();
  } catch(e) {
    setStatus('error', '更新エラー: ' + e.message);
  }
}

async function saveDensaiEntry() {
  const recordNo = document.getElementById('df_recordNo')?.value?.trim();
  const amount = parseInt(document.getElementById('df_amount')?.value) || 0;
  const debtorName = document.getElementById('df_debtorName')?.value?.trim();
  const settlementDate = document.getElementById('df_settlementDate')?.value;

  if (!recordNo || !amount || !debtorName) {
    alert('記録番号、金額、債務者名は必須です。');
    return;
  }

  // Check duplicate
  if (DATA.payments.find(p => p.DensaiRecordNo === recordNo)) {
    alert(`記録番号 ${recordNo} は既に登録済みです。`);
    return;
  }

  const item = {
    Title: `DENSAI-${recordNo}`,
    TransDate: settlementDate || new Date().toISOString().slice(0, 10),
    DataSource: 'でんさい',
    AccountType: 'でんさい',
    Amount: amount,
    PayerNameRaw: debtorName,
    PayerNameNorm: normalizePayerName(debtorName),
    DensaiRecordNo: recordNo,
    DensaiDebtorName: debtorName,
    DensaiDebtorCode: document.getElementById('df_debtorCode')?.value?.trim() || '',
    DensaiIssueDate: document.getElementById('df_issueDate')?.value || '',
    DensaiSettlementDate: settlementDate || '',
    DensaiDueDate: document.getElementById('df_dueDate')?.value || '',
    DensaiStatus: document.getElementById('df_status')?.value || '未決済',
    Status: '未処理',
    Note: document.getElementById('df_note')?.value || '',
  };

  // Name matching
  const match = findNameMatch(debtorName);
  if (match) {
    item.MatchedBillingCode = match.BillingCode;
    item.MatchedBillingName = match.BillingName;
    item.CompanyCode = match.CompanyCode;
    item.MatchConfidence = match.confidence;
    item.MatchReason = match.reason;
    item.Status = match.confidence === '確定' ? '自動候補あり' : '未処理';
  }

  try {
    setStatus('loading', 'でんさい登録中...');
    const newItem = await spCreateItem(SP.payments, item);
    DATA.payments.push(newItem);
    await logAudit('でんさい登録', 'AR_Payments', null, '', `記録番号:${recordNo}, 金額:${amount}, 債務者:${debtorName}`);
    setStatus('success', `でんさい登録完了: ${recordNo}`);
    closeModal();
    renderPage();
  } catch(e) {
    setStatus('error', 'でんさい登録エラー: ' + e.message);
  }
}
